<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#1a2a4a"/>

  <!-- Red accent stripe top-right -->
  <rect x="40" y="0" width="24" height="24" rx="0" fill="#c0392b" opacity="0.9"/>
  <rect x="40" y="0" width="24" height="24" rx="12" fill="#c0392b"/>

  <!-- House shape (white) -->
  <!-- Roof triangle -->
  <polygon points="32,10 12,28 52,28" fill="#ffffff"/>
  <!-- House body -->
  <rect x="16" y="27" width="32" height="22" rx="2" fill="#ffffff"/>
  <!-- Door -->
  <rect x="26" y="36" width="12" height="13" rx="2" fill="#1a2a4a"/>
  <!-- Window left -->
  <rect x="18" y="30" width="8" height="6" rx="1" fill="#1a2a4a"/>
  <!-- Window right -->
  <rect x="38" y="30" width="8" height="6" rx="1" fill="#1a2a4a"/>

  <!-- "G5" text at bottom -->
  <text
    x="32" y="58"
    font-family="Arial, sans-serif"
    font-size="9"
    font-weight="900"
    text-anchor="middle"
    fill="#d4af37"
    letter-spacing="1"
  >G5</text>
</svg>